<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reels — Kaden Wittig</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="index.html">KMW</a>
    <ul class="nav-links">
      <li><a href="index.html">Work</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- HEADER -->
  <div class="page-header">
    <h1 class="page-title">Reels</h1>
  </div>

  <!-- REELS -->
  <div class="reels-grid">

    <!-- REEL 1: Cinematography -->
    <div class="reel-item">
      <div class="reel-video reel-thumb" onclick="playReel(this,'4au8uB-dacU')">
        <img src="images/thumb-cinematography.jpg" alt="Cinematography Reel" style="width:100%;height:100%;object-fit:cover;" />
        <div class="play-overlay">&#9654;</div>
      </div>
      <p class="reel-title">Cinematography Reel</p>
      <p class="reel-desc">2026 &nbsp;·&nbsp; Director of Photography &nbsp;·&nbsp; <a href="https://youtu.be/4au8uB-dacU" target="_blank" rel="noopener" style="color: #888; border-bottom: 1px solid #333;">Watch on YouTube →</a></p>
    </div>

    <!-- REEL 2: Commercial -->
    <div class="reel-item">
      <div class="reel-video reel-thumb" onclick="playReel(this,'U2veivRJjQE')">
        <img src="images/thumb-commercial.jpg" alt="Commercial & Corporate Reel" style="width:100%;height:100%;object-fit:cover;" />
        <div class="play-overlay">&#9654;</div>
      </div>
      <p class="reel-title">Commercial &amp; Corporate Reel</p>
      <p class="reel-desc">2026 &nbsp;·&nbsp; Director / DP &nbsp;·&nbsp; <a href="https://youtu.be/U2veivRJjQE" target="_blank" rel="noopener" style="color: #888; border-bottom: 1px solid #333;">Watch on YouTube →</a></p>
    </div>

  </div>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 Kaden Wittig</p>
    <p>Triangle Rock Productions</p>
  </footer>

<script>
function playReel(el, id) {
  el.innerHTML = '<iframe src="https://www.youtube.com/embed/' + id + '?autoplay=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="width:100%;height:100%;border:none;"></iframe>';
  el.onclick = null;
  el.style.cursor = 'default';
}
</script>
</body>
</html>
